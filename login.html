<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập Admin — Digital SME</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
    <div class="text-center mb-8">
      <div class="inline-flex w-12 h-12 rounded-xl bg-blue-600 text-white items-center justify-center font-bold mb-4">DX</div>
      <h1 class="text-2xl font-bold text-slate-900">Đăng nhập quản trị</h1>
      <p class="text-sm text-slate-500 mt-2">Truy cập thông tin khách hàng và quản lý nội dung website</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5" for="username">Tên đăng nhập</label>
        <input id="username" type="text" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5" for="password">Mật khẩu</label>
        <input id="password" type="password" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" />
      </div>
      <p id="loginError" class="hidden text-sm text-red-600"></p>
      <button type="submit" class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700">Đăng nhập</button>
    </form>
    <div class="mt-6 p-4 rounded-lg bg-slate-50 text-xs text-slate-500 space-y-1">
      <p><strong>admin</strong> — toàn quyền (xem/sửa/xóa + quản lý nội dung)</p>
      <p><strong>editor</strong> — sửa/xóa lead + cập nhật nội dung frontend</p>
      <p><strong>viewer</strong> — chỉ xem thông tin khách hàng</p>
    </div>
  </div>
  <script>
    async function checkSession() {
      const res = await fetch('/api/auth/me');
      if (res.ok) window.location.href = '/admin.html';
    }
    checkSession();

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.message || 'Đăng nhập thất bại.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (data.token) localStorage.setItem('authToken', data.token);
      window.location.href = '/admin.html';
    });
  </script>
</body>
</html>
